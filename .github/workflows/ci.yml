name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tuf_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @tuf/shared build

      - run: pnpm --filter @apps/api typecheck

      - run: pnpm --filter web typecheck

      - run: pnpm --filter web lint

      - run: pnpm --filter @apps/api lint

      - run: pnpm --filter @apps/api test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tuf_test

      - run: pnpm --filter web test

      - run: pnpm --filter web build
