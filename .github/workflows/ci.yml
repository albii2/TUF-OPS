name: TUF CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install


      - name: Lint
        run: pnpm lint

      - name: Unit Tests
        run: pnpm -r test:unit

      - name: Integration Tests
        run: pnpm -r test:integration

      - name: E2E Smoke Tests
        run: pnpm -r test:e2e

      - name: Build
        run: pnpm -r build

      - name: Migration Checks
        run: echo "Placeholder for migration checks"

      - name: Drift Detection
        run: echo "Placeholder for drift detection"
