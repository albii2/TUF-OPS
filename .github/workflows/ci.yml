name: TUF Ops CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Type Check + Lint + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck:v1
      - run: pnpm lint
      - run: pnpm build:v1

  integration:
    name: Integration Tests (DB)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: tuf_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tuf_test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tuf_test
      AUTH_TOKEN_SECRET: ci-auth-token-secret
      INITIAL_OWNER_CREDENTIAL: '0000'
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migrate:test
      - run: pnpm --filter @apps/api test:run
